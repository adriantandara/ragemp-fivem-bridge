<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Showcase HUD</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div id="hud">
      <header>
        <span class="dot"></span>
        <h1>RAGE:MP → FiveM Bridge</h1>
      </header>

      <div class="stats">
        <div class="stat">
          <div class="label">Players online</div>
          <div class="value" id="players">–</div>
        </div>
        <div class="stat">
          <div class="label">Server time</div>
          <div class="value" id="time">–</div>
        </div>
      </div>

      <div class="actions">
        <button data-label="Primary">Send "Primary" to client</button>
        <button data-label="Secondary">Send "Secondary" to client</button>
      </div>

      <footer>
        <button id="close">Close (also: /ui)</button>
      </footer>
    </div>

    <script src="https://cfx-nui-ragemp-fivem-bridge/ui/_bridge.js"></script>
    <script src="index.js"></script>
  </body>
</html>
