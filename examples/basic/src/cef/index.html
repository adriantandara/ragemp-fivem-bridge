<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>UI</title>
    <style>
      html, body { margin: 0; padding: 0; background: transparent; color: white; font-family: sans-serif; }
      #app { position: fixed; top: 20px; left: 20px; padding: 12px 16px; background: rgba(0,0,0,0.6); border-radius: 6px; }
</style>
  </head>
  <body>
    <div id="app">CEF UI loaded ✓</div>
    <script>
window.addEventListener("DOMContentLoaded", () => {
        if (typeof mp !== "undefined") {
          mp.events.add("hello", (msg) => {
            document.getElementById("app").textContent = msg;
          });
        }
      });
    </script>
  </body>
</html>
